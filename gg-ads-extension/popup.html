<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 400px;
      padding: 15px;
      background-color: #f8f9fa;
      color: #333;
    }
    h3 {
      margin-top: 0;
      font-size: 16px;
      color: #1a73e8;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 13px;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input[type="text"], select {
      width: 100%;
      padding: 6px;
      box-sizing: border-box;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: 14px;
    }
    .profile-actions {
      display: flex;
      gap: 5px;
      margin-top: 5px;
    }
    .profile-actions button {
      padding: 4px 8px;
      font-size: 11px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      background: #f1f3f4;
      cursor: pointer;
      color: #333;
    }
    .profile-actions button:hover {
      background: #e8eaed;
    }
    .button-group {
      display: flex;
      gap: 5px;
      margin-top: 15px;
    }
    .main-btn {
      flex: 1;
      padding: 8px 4px;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.2s;
    }
    #highlightBtn { background-color: #1a73e8; }
    #highlightBtn:hover { background-color: #1557b0; }
    #tickBtn { background-color: #d93025; }
    #tickBtn:hover { background-color: #b3261e; }
    #saveBtn { background-color: #188038; }
    #saveBtn:hover { background-color: #13662c; }
    
    .status {
      margin-top: 8px;
      font-size: 12px;
      color: #188038;
      text-align: center;
      min-height: 14px;
    }
    .results {
      margin-top: 15px;
      padding-top: 10px;
      border-top: 1px solid #dadce0;
    }
    .results h4 {
      margin: 0 0 8px 0;
      color: #d93025;
      font-size: 14px;
    }
    .table-container {
      max-height: 200px;
      overflow-y: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    th, td {
      border: 1px solid #dadce0;
      padding: 6px 4px;
      text-align: left;
      word-break: break-word;
    }
    th {
      background-color: #f1f3f4;
      position: sticky;
      top: 0;
    }
  </style>
</head>
<body>
  <h3>Highlight & Select Metrics</h3>
  
  <div class="form-group">
    <label for="profileSelect">Profile:</label>
    <select id="profileSelect"></select>
    <div class="profile-actions">
      <button id="newProfileBtn">New</button>
      <button id="setDefaultBtn">Set Default</button>
      <button id="delProfileBtn" style="color: #d93025;">Delete</button>
    </div>
  </div>

  <div class="form-group">
    <label for="cost">Cost (Greater than or equal >=):</label>
    <input type="text" id="cost" value="1">
  </div>
  
  <div class="form-group">
    <label for="convValue">Conv. Value / Cost (Less than or equal <=):</label>
    <input type="text" id="convValue" value="0.59">
  </div>

  <div class="button-group">
    <button id="highlightBtn" class="main-btn">Run</button>
    <button id="tickBtn" class="main-btn">Quick Tick</button>
    <button id="saveBtn" class="main-btn">Save Config</button>
  </div>
  <div id="statusMsg" class="status"></div>

  <div class="results" id="resultsContainer" style="display: none;">
    <h4>Target Missed Locations:</h4>
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Location</th>
            <th>Cost</th>
            <th>Conv.</th>
            <th>All Conv.</th>
          </tr>
        </thead>
        <tbody id="failedList"></tbody>
      </table>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
